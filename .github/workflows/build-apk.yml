name: Build First Riff Studio APK

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: first-riff-studio-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: first-riff-studio-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: First Riff Studio v1.0.${{ github.run_number }}
          body: |
            ## First Riff Studio APK

            A full-featured mobile music studio with:
            - **16 Drum Pads** — synthesized kick, snare, hi-hats, cymbals, claps, FX and more
            - **Step Sequencer** — 8-track × 16-step drum machine with BPM control
            - **Synthesizer** — dual-oscillator subtractive synth with ADSR envelope, filter, and LFO
            - **Keyboard** — 2-octave piano with Electronic / Piano / Bass / Pad voice modes
            - **FX Pedals** — Drive, Echo, Space (reverb), Chorus, Phaser, Compressor
            - **Loop Machine** — 4-track event looper with record/play/overdub

            ### Install
            1. Download `first-riff-studio-debug.apk`
            2. On Android: Settings → Security → allow "Install unknown apps"
            3. Open the APK to install

          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
